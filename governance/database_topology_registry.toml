[[databases]]
db_name = "raw_market.duckdb"
module_id = "data"
grain = "source"
ledger_role = "raw_source_fact"
writer = "run_raw_market_sync"
allowed_modes = ["bounded", "segmented", "full", "resume", "audit-only", "daily_incremental"]
checkpoint_policy = "source_manifest_hash"
checkpoint_key = ["source_vendor", "source_batch_id"]
replay_scope = ["source_batch_id", "trade_date", "symbol"]
promote_rule = "staging_audit_passed"

