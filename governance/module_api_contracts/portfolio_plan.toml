module_id = "portfolio_plan"
display_name = "Portfolio Plan"
contract_version = "v1"
status = "released"
authority_assets = [
    "H:/Asteria-Validated/Asteria-docs-code-20260428-214427.zip",
    "H:/Asteria-Validated/Asteria-position-bounded-proof-build-card-20260506-01.zip",
    "H:/Asteria-Validated/Asteria-portfolio-plan-freeze-review-20260507-01.zip",
    "H:/Asteria-Validated/Asteria-portfolio-plan-bounded-proof-build-card-20260507-01.zip",
]
gate_state = "freeze_review_passed; bounded_proof_passed; daily_impact_schema_frozen; full_build_not_executed"
formal_db_permission = "released_day_bounded_portfolio_admission_target_exposure_trim_only; daily_impact_schema_frozen; downstream_daily_runtime_requires_runner_card; no_formal_H:/Asteria-data_mutation_under_this_card; full_build_requires_new_card"
writeback_boundary = "consume released Position only; never write back upstream"
run_modes = ["bounded", "resume", "audit-only"]
resume_behavior = "resume from portfolio checkpoint after Position release"
source_manifest_fields = ["source_position_release_version", "source_position_run_id"]
daily_protocol_role = "writer"
daily_protocol_scope_fields = ["symbol", "trade_date", "timeframe", "source_run_id"]
daily_protocol_lineage_fields = ["source_run_id", "target_run_id"]
daily_protocol_replay_scope_fields = ["symbol", "trade_date", "source_run_id"]
daily_protocol_impact_date_fields = ["candidate_dt", "plan_dt", "exposure_valid_from", "exposure_valid_until"]
forbidden_inputs = ["alpha_internal", "malf_internal", "signal_internal", "mock_formal_data"]
forbidden_outputs = ["position_writeback", "signal_writeback", "alpha_writeback", "malf_writeback", "actual_fill", "broker_order_id"]

[[official_inputs]]
input_type = "database"
db_name = "position.duckdb"
table = "position_candidate_ledger"
source_role = "official"
natural_key = ["signal_id", "candidate_type", "position_rule_version"]
required_fields = ["signal_id", "symbol", "candidate_type"]

[[official_outputs]]
db_name = "portfolio_plan.duckdb"
table = "portfolio_admission_ledger"
natural_key = ["position_candidate_id", "portfolio_plan_rule_version"]
public_fields = ["position_candidate_id", "admission_status", "target_exposure_ref"]
version_fields = ["run_id", "schema_version", "portfolio_plan_rule_version", "source_position_release_version"]

[[official_outputs]]
db_name = "portfolio_plan.duckdb"
table = "portfolio_target_exposure"
natural_key = ["portfolio_admission_id", "exposure_type", "portfolio_plan_rule_version"]
public_fields = ["portfolio_admission_id", "exposure_type", "target_weight", "target_notional", "target_quantity_hint"]
version_fields = ["run_id", "schema_version", "portfolio_plan_rule_version", "source_position_release_version"]

[[official_outputs]]
db_name = "portfolio_plan.duckdb"
table = "portfolio_trim_ledger"
natural_key = ["portfolio_admission_id", "trim_reason", "portfolio_plan_rule_version"]
public_fields = ["portfolio_admission_id", "trim_reason", "pre_trim_exposure", "post_trim_exposure", "constraint_name"]
version_fields = ["run_id", "schema_version", "portfolio_plan_rule_version", "source_position_release_version"]
